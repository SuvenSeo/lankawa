name: Ingest

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run ingest
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BOT_CONTACT_URL: https://github.com/ArdenoStudio/lankawa
        run: python -m ingest.run

      - name: Trigger Vercel cron (optional)
        continue-on-error: true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: https://lankawa.vercel.app
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl -sf -H "Authorization: Bearer $CRON_SECRET" "$DEPLOY_URL/api/cron/ingest"
          else
            echo "CRON_SECRET not set — skipping Vercel cron trigger"
          fi
